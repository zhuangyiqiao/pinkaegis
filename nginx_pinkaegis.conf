# Nginx 配置文件 - PINKAEGIS 生活系统
# 原始文件名：nginx_focus.conf → 现已更新域名配置为 pinkaegis
# 部署时可重命名为 nginx_pinkaegis.conf

server {
    listen 80;
    # 域名已更新为 pinkaegis（用户自定义域名）
    # 部署时请根据实际域名修改，例如：pinkaegis.com
    server_name pinkaegis;

    # 静态资源直接由 Nginx 托管（性能更优）
    location /static/ {
        # 请根据实际部署路径修改，示例：/home/ubuntu/pinkaegis-app/static/
        alias /home/ubuntu/pinkaegis-app/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # 其余请求转发给 Gunicorn（Flask）
    location / {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
